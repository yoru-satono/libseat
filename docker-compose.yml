name: libseat

services:
  db:
    image: postgres:17-alpine
    container_name: libseat-db
    restart: "no"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: libseat-mailpit
    restart: "no"
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build: ./server
    container_name: libseat-app
    profiles: ["prod"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: "8080"
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM: noreply@libseat.local
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}

  web:
    build: ./web
    container_name: libseat-web
    profiles: ["prod"]
    restart: "no"
    depends_on:
      - app
    ports:
      - "80:80"

volumes:
  postgres_data:
