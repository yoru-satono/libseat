spring:
  application:
    name: libseat-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:libseat}
    username: ${DB_USER:libseat}
    password: ${DB_PASSWORD:libseat123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:bXktc2VjcmV0LWtleS1mb3ItbGlic2VhdC1hcHAtMzJieXRlcyE=}
    access-token-expiration: 7200
    refresh-token-expiration: 604800
  email:
    from: ${MAIL_FROM:noreply@libseat.com}
    base-url: ${APP_BASE_URL:http://localhost:8080}
    token-expiry-hours: 24

logging:
  level:
    root: INFO
    com.libseat: DEBUG
